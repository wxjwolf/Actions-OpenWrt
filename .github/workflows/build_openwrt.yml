name: Build OpenWrt (Official + x86_64 + SSR Plus)

on:
  workflow_dispatch:

env:
  OPENWRT_REPO: openwrt/openwrt
  OPENWRT_BRANCH: openwrt-25.12
  TARGET: x86
  SUBTARGET: 64

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          df -h

      - name: Install Build Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential clang flex g++ gawk \
            gcc-multilib g++-multilib gettext git \
            libncurses5-dev libssl-dev python3-distutils \
            rsync unzip zlib1g-dev file wget \
            asciidoc binutils bzip2 util-linux help2man \
            intltool libelf-dev make patch perl-modules \
            python3-dev xsltproc qemu-utils libglib2.0-dev \
            libgtk2.0-dev libpcre3-dev liblzma-dev \
            libxml-parser-perl

      - name: Checkout OpenWrt Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPENWRT_REPO }}
          ref: ${{ env.OPENWRT_BRANCH }}
          path: openwrt

      # 先运行 diy-part1 写入第三方源，然后再统一进行 feeds 更新和安装
      - name: Run diy-part1.sh
        run: |
          cp ./diy-part1.sh openwrt/
          cd openwrt
          chmod +x diy-part1.sh
          ./diy-part1.sh

      - name: Update and Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Import Config
        run: |
          cd openwrt
          cp ../.config .config
          make defconfig

      - name: Run diy-part2.sh
        run: |
          cp ./diy-part2.sh openwrt/
          cd openwrt
          chmod +x diy-part2.sh
          ./diy-part2.sh

      - name: Download Packages
        run: cd openwrt && make download -j$(nproc)

      - name: Compile OpenWrt
        run: cd openwrt && make -j$(nproc) V=s
      - name: List Files (Debug)
        run: |
          echo "=== Checking output directory ==="
          ls -R openwrt/bin/targets/x86/64/ || true
      
      - name: Upload OpenWrt Image
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-x86-64-Images
          # 改变这里的 path，用 * 匹配所有镜像格式
          path: |
            openwrt/bin/targets/x86/64/*.img.gz
            openwrt/bin/targets/x86/64/*.img
          retention-days: 30

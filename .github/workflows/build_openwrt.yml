name: Build OpenWrt (Official + x86 Legacy)

on:
  workflow_dispatch:    # 手动触发
  #schedule:
   # - cron: '0 18 * * *'  # 每天北京时间凌晨2点（可选）

env:
  OPENWRT_REPO: https://github.com/openwrt/openwrt.git
  OPENWRT_BRANCH: openwrt-25.12                  # 或指定 v25.12.x 等稳定分支
  TARGET: x86
  SUBTARGET: legacy

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Checkout OpenWrt Source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.OPENWRT_REPO }}
          ref: ${{ env.OPENWRT_BRANCH }}
          path: openwrt

      - name: Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Run diy-part1.sh
        run: |
          cp ../diy-part1.sh openwrt/
          cd openwrt
          chmod +x diy-part1.sh
          ./diy-part1.sh

      - name: Import Config
        run: |
          cd openwrt
          cp ../.config .config
          make defconfig

      - name: Run diy-part2.sh
        run: |
          cp ../diy-part2.sh openwrt/
          cd openwrt
          chmod +x diy-part2.sh
          ./diy-part2.sh

      - name: Download Packages
        run: cd openwrt && make download -j$(nproc)

      - name: Compile
        run: cd openwrt && make -j$(nproc) V=s

      - name: Upload rootfs.tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-rootfs
          path: openwrt/bin/targets/x86/legacy/*rootfs.tar.gz
          retention-days: 30
